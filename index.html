<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050505" />

    <script>
      document.documentElement.classList.add("js");
    </script>

    <style>
      :root { background-color: #050505; color-scheme: dark; }
      body { margin: 0; background-color: #050505; overflow: hidden; }
      #root { width: 100%; height: 100svh; min-height: 100svh; }

      .ssr-shell {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        opacity: 1;
        pointer-events: auto;
      }

      html.js .ssr-shell {
        transition: opacity 120ms linear;
      }

      html.js.hydrated .ssr-shell {
        opacity: 0;
        pointer-events: none;
      }

      html.js.hydrated .ssr-shell * {
        pointer-events: none;
      }
    </style>

    <!--__INJECT_HEAD__-->

    <!-- 
      FAVICONS
      1. SVG: Prioridad para navegadores de escritorio (Chrome/Firefox/Edge). 
         Permite transparencia y se ve nítido en cualquier resolución.
      2. ICO: Fallback para navegadores muy antiguos (Safari antiguo/IE).
      3. PNG (192px): CRÍTICO para Google Search (SEO). Google usa este para mostrar
         el logo junto al resultado de búsqueda.
      4. Apple Touch Icon: Para iOS home screen.
    -->
    
    <!-- A. Navegadores Modernos (Tu icono transparente) -->
    <!-- NOTA: Asegúrate de copiar tu archivo .svg a /public/favicon.svg -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- B. Compatibilidad Legacy -->
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <!-- C. Google SEO & Android (Alta resolución) -->
    <link rel="icon" type="image/png" href="/pwa/icon-192.png" sizes="192x192" />
    
    <!-- D. iOS -->
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />

    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Perf: preconnect + dns-prefetch -->
    <link rel="dns-prefetch" href="//storage.googleapis.com" />
    <link rel="preconnect" href="https://storage.googleapis.com" crossorigin />

    <!-- Critical Assets Preload -->
    <link
      rel="preload"
      as="image"
      href="/images/paper.webp"
      type="image/webp"
      fetchpriority="high"
    />
    <link
      rel="preload"
      href="/fonts/montserrat-900.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/montserrat-700.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="root"></div>
    <!--__INJECT_APP_SHELL__-->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
